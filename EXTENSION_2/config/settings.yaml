      timeout: 30
      max_tokens: 2000
      batch_size: 10
      retries: 5
      delay: 1.0
      concurrency: 2
    - name: "GitHub Models"
      provider: "github"
      model: "gpt-4o-mini"
      env_var: "GIT_HUB_TOKEN"
      base_url: "https://models.inference.ai.azure.com/chat/completions"
