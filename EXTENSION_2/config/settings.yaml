      concurrency: 2
    - name: "Mistral"
      provider: "mistral"
      model: "mistral-large-latest"
      env_var: "MISTRAL_API_KEY"
      base_url: "https://api.mistral.ai/v1/chat/completions"
      cost_per_1k_tokens: 0.0020
      temperature: 0.0
      timeout: 30
      max_tokens: 2000
